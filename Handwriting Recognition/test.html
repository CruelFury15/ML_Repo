<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Handwriting Recognition Input</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      text-align: center;
    }

    .canvas-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 1rem;
    }

    canvas {
      border: 2px solid #000;
      height: 80px;
      touch-action: none;
      width: 80px;
    }

    .controls {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 1rem;
    }

    pre {
      margin: 0.25rem auto;
      max-width: 56rem;
      overflow-x: auto;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body onload="InitThis();">
  <script src="JsCode.js"></script>

  <main>
    <div class="canvas-row">
      <canvas id="myCanvas" width="80" height="80" aria-label="First digit drawing area"></canvas>
      <canvas id="myCanvas2" width="80" height="80" aria-label="Second digit drawing area"></canvas>
      <canvas id="myCanvas3" width="80" height="80" aria-label="Third digit drawing area"></canvas>
      <canvas id="myCanvas4" width="80" height="80" aria-label="Fourth digit drawing area"></canvas>
    </div>

    <div class="controls">
      <button type="button" onclick="clearArea();">Clear Area</button>

      <label for="selWidth">Line width</label>
      <select id="selWidth">
        <option value="9">9</option>
        <option value="10">10</option>
        <option value="11">11</option>
        <option value="12">12</option>
        <option value="14" selected>14</option>
        <option value="18">18</option>
      </select>

      <label for="selColor">Color</label>
      <select id="selColor">
        <option value="#141c3a">Black</option>
        <option value="#6400e4">Purple</option>
        <option value="#4b35ef" selected>Royal blue</option>
        <option value="#fa4359">Red</option>
        <option value="#37c3be">Mint</option>
        <option value="#ffc107">Yellow</option>
        <option value="#cccccc">Gray</option>
      </select>

      <button type="button" onclick="array();">Get Array</button>
    </div>

    <pre id="opening_bracket"></pre>
    <pre id="display"></pre>
    <pre id="display2"></pre>
    <pre id="display3"></pre>
    <pre id="display4"></pre>
    <pre id="closing_bracket"></pre>
  </main>
</body>
</html>
